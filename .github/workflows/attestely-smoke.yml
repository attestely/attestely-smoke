name: Attestely smoke (anonymous)
on:
  workflow_dispatch:
  push:
permissions:
  contents: read
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: getAttestely/cli@v1
        with:
          fail-on: none      # le job ne plante pas si des findings sont trouvés
          # pas de token => mode anonyme local
